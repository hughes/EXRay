name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Mount Bazel cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', '.bazelrc', 'BUILD.bazel') }}
          restore-keys: bazel-${{ runner.os }}-

      # The BUILD.bazel genrule hardcodes a local rc.exe path.
      # Discover the actual path on this runner and patch it in.
      - name: Locate rc.exe
        shell: pwsh
        run: |
          $rc = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter rc.exe |
                Where-Object { $_.DirectoryName -match 'x64$' } |
                Sort-Object { [version]($_.DirectoryName -replace '.*\\(\d+\.\d+\.\d+\.\d+)\\.*','$1') } -Descending |
                Select-Object -First 1
          if (-not $rc) { throw "rc.exe not found" }
          Write-Host "Found rc.exe at: $($rc.FullName)"
          # Convert to 8.3 short path for the genrule
          $fso = New-Object -ComObject Scripting.FileSystemObject
          $short = $fso.GetFile($rc.FullName).ShortPath
          Write-Host "Short path: $short"
          # Patch BUILD.bazel with the correct rc.exe path
          $build = Get-Content BUILD.bazel -Raw
          $build = $build -replace 'C:\\PROGRA~2\\WI3CF2~1\\10\\bin\\[^\\]+\\x64\\rc\.exe', ($short -replace '\\','\\')
          Set-Content BUILD.bazel $build

      - name: Build
        shell: cmd
        run: bazelisk build //:EXRay

      - name: Cache test images
        uses: actions/cache@v4
        with:
          path: tests/.openexr-images.zip
          key: openexr-test-images-e38ffb07

      - name: Fetch test images
        shell: bash
        run: bash tests/fetch_test_images.sh

      - name: Run validation tests
        shell: bash
        run: |
          ./bazel-bin/EXRay.exe --validate tests/images tests/validate_results.txt
          result=$?
          cat tests/validate_results.txt
          exit $result

      - name: GUI smoke test
        shell: bash
        run: bash tests/smoke_test.sh tests/images

      - name: Run benchmark
        shell: bash
        run: |
          ./bazel-bin/EXRay.exe --benchmark tests/images tests/benchmark_results.json
          echo "=== Benchmark Results ==="
          cat tests/benchmark_results.json

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: tests/benchmark_results.json
          retention-days: 90
